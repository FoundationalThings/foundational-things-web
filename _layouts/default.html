<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} — Foundational Things{% else %}Foundational Things{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link href="./styles.css" rel="stylesheet" />

    <!-- Full favicon support (with manifest), using https://realfavicongenerator.net/ -->
    <link
      rel="icon"
      type="image/png"
      href="./favicon/favicon-96x96.png?v=20260603"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="./favicon/favicon.svg?v=20260603"
    />
    <link rel="shortcut icon" href="./favicon/favicon.ico?v=20260603" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favicon/apple-touch-icon.png?v=20260603"
    />
    <meta name="apple-mobile-web-app-title" content="FT Web" />
    <link rel="manifest" href="./favicon/site.webmanifest?v=20260603" />
  </head>
  <body>
    {% include sprites.html %}
    <div class="site-wrap">
      {% include header.html %}
      {{ content }}
      {% include footer.html %}
    </div>
  </body>
</html>
